services:
  - type: web
    name: webstore-portfolio
    runtime: node
    plan: free
    buildCommand: npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DEMO_ADMIN_PASSWORD
        sync: false
      - key: DEMO_USER_PASSWORD
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: CLOUDINARY_URL
        sync: false

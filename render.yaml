services:
  - type: web
    name: webstore-portfolio
    runtime: node
    plan: free
    buildCommand: npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DEMO_ADMIN_PASSWORD
        generateValue: true
      - key: DEMO_USER_PASSWORD
        value: PortfolioDemo2026!
      - key: GOOGLE_CLIENT_ID
        value: 566283033694-2m7n5phsho0icok735g6jkgrbld19hhe.apps.googleusercontent.com
      - key: VITE_GOOGLE_CLIENT_ID
        value: 566283033694-2m7n5phsho0icok735g6jkgrbld19hhe.apps.googleusercontent.com
      - key: CLOUDINARY_URL
        sync: false
